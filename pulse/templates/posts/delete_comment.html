{% load static %}

<!DOCTYPE html>
<html>
  <head>
    <title>Delete Comment - Pulse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons generated by favicon.io -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{% static 'images/apple-touch-icon.png' %}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{% static 'images/favicon-32x32.png' %}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="{% static 'images/favicon-16x16.png' %}"
    />

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    <div class="navbar">
      <a href="{% url 'home' %}" class="logo"> Pulse<span>.</span> </a>
    </div>

    <div class="form-page">
      <div class="form-card danger-card">
        <h1>Delete Comment</h1>

        <p class="delete-warning">
          Are you sure you want to permanently delete this comment?
        </p>

        <blockquote style="color: #cbd5e1">{{ comment.content }}</blockquote>

        <form method="POST">
          {% csrf_token %}

          <div class="form-actions">
            <button type="submit" class="button danger">Delete Forever</button>

            <a
              href="{% url 'post_detail' comment.post.pk %}"
              class="button secondary"
            >
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
