{% load static %}

<!DOCTYPE html>

<html>

<head>
    <title>{{ profile_user.username }} - Pulse</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="navbar">
    <a href="{% url 'home' %}" class="logo">
        Pulse<span>.</span>
    </a>
</div>

<div class="container">


<div class="post-card">

    <h1>{{ profile_user.username }}</h1>

    <p>
        Joined:
        {{ profile_user.date_joined|date:"d M Y" }}
    </p>

    <p>
        Posts:
        {{ posts.count }}
    </p>

    <p>
        Comments:
        {{ comments.count }}
    </p>

</div>

<h2>Recent Posts</h2>

{% for post in posts %}

    <div class="post-card">

        <a href="{% url 'post_detail' post.pk %}">
            {{ post.title }}
        </a>

    </div>

{% empty %}

    <div class="post-card">
        No posts yet.
    </div>

{% endfor %}


</div>

</body>

</html>
