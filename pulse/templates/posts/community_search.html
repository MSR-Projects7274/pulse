{% load static %}

<!DOCTYPE html>
<html>
  <head>
    <title>Search Communities - Pulse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Favicons generated by favicon.io -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
  </head>

  <body>
    <div class="navbar">
      <a href="{% url 'home' %}" class="logo"> Pulse<span>.</span> </a>
    </div>

    <div class="container">
      
      <h1>Community Search</h1>

      {% for department in departments %}

      <div class="post-card">
        <a href="{% url 'department_posts' department.id %}">
          {{ department.name }}
        </a>
      </div>

      {% empty %}

      <div class="post-card">No communities found.</div>

      {% endfor %}
    </div>
  </body>
</html>
